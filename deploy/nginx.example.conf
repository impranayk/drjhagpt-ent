# Reverse proxy + TLS for DrJhaGPT Pro.
# Streamlit uses WebSockets, so the Upgrade/Connection headers are required.

server {
    listen 443 ssl;
    server_name drjhagpt.example.com;

    ssl_certificate     /etc/ssl/certs/drjhagpt.crt;
    ssl_certificate_key /etc/ssl/private/drjhagpt.key;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (required by Streamlit)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name drjhagpt.example.com;
    return 301 https://$host$request_uri;
}
