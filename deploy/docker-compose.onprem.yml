# On-prem stack for DrJhaGPT Enterprise.
# Run from the repo root:
#   docker compose -f deploy/docker-compose.onprem.yml up -d --build
services:
  app:
    build: ..
    image: drjhagpt-enterprise
    env_file:
      - ../.env                 # GROQ_API_KEY (or self-hosted LLM), ENABLE_* toggles
    ports:
      - "8501:8501"             # remove once nginx/Traefik fronts it (see nginx.example.conf)
    restart: unless-stopped
    volumes:
      - app-data:/app/data      # persists the knowledge index (+ embedded Qdrant if used)
      - app-logs:/app/logs      # persists request traces

  # --- Optional: Qdrant as a service (needs the QDRANT_URL code hook — see DEPLOYMENT.md §10) ---
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   restart: unless-stopped
  #   volumes:
  #     - qdrant-data:/qdrant/storage

  # --- Optional: Arize Phoenix tracing UI ---
  # phoenix:
  #   image: arizephoenix/phoenix:latest
  #   restart: unless-stopped
  #   ports:
  #     - "6006:6006"

volumes:
  app-data:
  app-logs:
  # qdrant-data:
