name: Keep app awake

# Pings the deployed Streamlit app on a schedule so the free Community Cloud
# tier doesn't put it to sleep. NOTE: GitHub's scheduled runs can be delayed a
# few minutes and pause after ~60 days of repo inactivity — for rock-solid
# uptime also add this URL to a dedicated pinger (e.g. cron-job.org, every 5m).
on:
  schedule:
    - cron: "*/10 * * * *"   # roughly every 10 minutes
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        env:
          APP_URL: "https://drjhagpt-ent.streamlit.app"
        run: |
          for path in "/" "/_stcore/health"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 40 \
                   -A "keep-alive-bot" "${APP_URL}${path}" || echo "000")
            echo "GET ${APP_URL}${path} -> ${code}"
          done
